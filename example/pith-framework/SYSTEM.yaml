# System Knowledge — ShopFast

identity:
  name: shopfast
  description: E-commerce platform
  stack: Node.js 20 + Express + PostgreSQL 16

documents:
  - name: ARCHITECTURE
    description: System architecture, modules, dependencies, data model
    path: pith-framework/ARCHITECTURE.md

  - name: LESSONS_LEARNED
    description: Reusable technical findings across projects
    path: pith-framework/LESSONS_LEARNED.md

module_context:
  pattern: "{module}/CLAUDE.md"
  max_lines: 50
  sections:
    - What this is
    - Dependencies
    - Key patterns
    - Files
    - Watch out

data_model:
  tables:
    - name: users
      key_columns: [id, email, password_hash, role]
      relationships: "1:N with orders, 1:N with refresh_tokens"
    - name: refresh_tokens
      key_columns: [id, user_id, token_hash, expires_at, revoked_at]
      relationships: "N:1 with users"
