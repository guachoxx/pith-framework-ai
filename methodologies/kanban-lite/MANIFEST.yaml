# Methodology Manifest — Kanban-Lite (Minimal viable)
# Framework v2 — Contract fields: identity, work_unit, states, distillation (required)
# See ENGINE.md §6 for contract specification

identity:
  name: kanban-lite
  version: 1.0
  description: Minimal methodology for simple workflows

work_unit:
  label: ticket
  entry_point: STATUS
  entry_point_fields:
    - last_updated
    - next_step

states:
  values:
    - { name: TODO, type: active }
    - { name: DOING, type: active }
    - { name: DONE, type: completed }

artifacts:
  standard:
    - { name: STATUS, required: true }
    - { name: LOG, required: false }

distillation:
  triggers:
    - user_request
  always_update: [STATUS]

conventions:
  documentation_language: EN
